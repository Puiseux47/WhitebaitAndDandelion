<!-- こんなエイプリルフールのページの中身を覗いてどうするというんだい、少年？ -->
<!-- 時間の無駄だからさっさと診断に戻りたまえよ。 -->

<!DOCTYPE html>
<html lang="ja">
<head>
  	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>しらすとたんぽぽ</title>
</head>
<body>
	<div class="main_container">
		<div style="margin: 2px 2px 2px 2px;">
			<h3>ＨＯ診断</h3>
		</div>
		<hr>
		<div class="container_middle">
			<img class="imgbox" id="imgbox"/>
			<p id="questionbox" style="margin-top: 10px; height: 40px; font-size: 12pt;"></p>
		</div>
		<hr>
		<div style="margin: 2px 2px 2px 2px;">
			<button id="button1"></button>
			<button id="button2"></button>
		</div>
	</div>

	<div class="mask"></div>

	<div class="modal">
		<div class="modal_content">
			<h2>結果発表</h2>
			<hr>
			<p id="result_text">君にオススメのＨＯは……</p>
			<p id="result_subtext"></p>
			<img id="result_img"/>
			<hr>
			<div class="result_close_button_container">
				<button class="result_close_button">
					閉じる
				</button>
			</div>
		</div>
	</div>

	<script src="script.js"></script>
</body>
</html>
